<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Results | VoteSafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('votesafe_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        body {
            position: relative;
            background: transparent !important;
        }
        
        .dashboard-bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: -2;
            background-image: url("{{ url_for('static', filename='images/dashboard_bg.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(4px);
            transform: scale(1.02);
        }
        
        .dashboard-bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-color: var(--bg-body);
            opacity: 0.85;
        }

        .chart-container {
            width: 100%;
            height: 500px;
            padding: 2rem;
            margin-top: 2rem;
            position: relative;
        }
    </style>
</head>
<body>
    <div class="dashboard-bg-wrapper"></div>
    <div class="dashboard-bg-overlay"></div>
    
    <div id="loader" class="loading-overlay"><div class="spinner"></div></div>

    <nav>
        <div class="logo">VOTE_SAFE</div>
        <div class="nav-links">
            <a href="/" class="nav-item"><i class="fa-solid fa-house" style="margin-right: 6px;"></i>Home</a>
            <a href="/dashboard" class="nav-item"><i class="fa-solid fa-table-columns" style="margin-right: 6px;"></i>Dashboard</a>
            <a href="/results" class="nav-item active"><i class="fa-solid fa-chart-pie" style="margin-right: 6px;"></i>Results</a>
            <a href="/admin" id="adminLink" class="nav-item hidden"><i class="fa-solid fa-shield-halved" style="margin-right: 6px;"></i>Admin</a>
            <div class="theme-toggle" onclick="ThemeManager.toggle()" title="Toggle Theme">
                <i class="fas fa-sun"></i>
            </div>
            <button class="btn btn-primary" id="loginBtn" onclick="location.href='/'"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
            <button class="btn btn-outline hidden" id="logoutBtn" onclick="Auth.logout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
        </div>
    </nav>

    <div class="container animate-fade">
        <header style="text-align: center; margin-bottom: 3rem;">
            <h1 class="text-gradient" style="font-size: 3rem; margin-bottom: 1rem;">Live Election Results</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Watch the results update in real-time as votes are cast across the network.</p>
        </header>

        <div class="glass chart-container animate-slide">
            <canvas id="resultsChart"></canvas>
        </div>

        <div id="resultsList" class="voting-grid" style="margin-top: 4rem;">
            <!-- Individual status cards -->
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth_handler.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
    <script>
        let resultsChart = null;
        let pollingInterval = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // SECURITY: Route Guard
            if (!Auth.isAuthenticated()) {
                window.location.href = '/';
                return;
            }

            // UI Toggle
            document.getElementById('loginBtn').classList.add('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');

            // Initial Load
            await initDashboard();

            // Setup 3s Polling
            pollingInterval = setInterval(updateData, 3000);

            // Hide Loader
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.classList.add('hidden'), 500);
        });

        async function initDashboard() {
            const data = await fetchData();
            renderChart(data);
            renderList(data);
        }

        async function updateData() {
            const data = await fetchData();
            updateChart(data);
            renderList(data);
        }

        async function fetchData() {
            try {
                // Secure Fetch with JWT
                const data = await Auth.fetch('/api/results');
                return data;
            } catch (err) {
                console.error('Fetch error:', err);
                if (err.status === 401) window.location.href = '/';
                return [];
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('resultsChart').getContext('2d');
            
            const labels = data.map(d => d.name);
            const votes = data.map(d => d.votes);

            resultsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Votes Cast',
                        data: votes,
                        backgroundColor: (context) => {
                            const chart = context.chart;
                            const {ctx, chartArea} = chart;
                            if (!chartArea) return null;
                            const gradient = ctx.createLinearGradient(0, chartArea.bottom, 0, chartArea.top);
                            gradient.addColorStop(0, '#3b82f6');
                            gradient.addColorStop(1, '#10b981');
                            return gradient;
                        },
                        borderRadius: 10,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#94a3b8', font: { family: 'Inter', size: 12 } }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#f8fafc', font: { family: 'Inter', size: 14, weight: 'bold' } }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleFont: { family: 'Inter', size: 14 },
                            bodyFont: { family: 'Inter', size: 14 },
                            padding: 12,
                            cornerRadius: 10
                        }
                    }
                }
            });
        }

        function updateChart(data) {
            if (!resultsChart) return;
            resultsChart.data.labels = data.map(d => d.name);
            resultsChart.data.datasets[0].data = data.map(d => d.votes);
            resultsChart.update('none'); // Update without animation for smooth feel
        }

        function renderList(data) {
            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            
            data.forEach((d, i) => {
                const card = document.createElement('div');
                card.className = 'glass dash-card animate-slide';
                card.style.animationDelay = `${i * 0.1}s`;
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <i class="fa-solid ${i === 0 ? 'fa-trophy' : 'fa-chart-simple'} text-gradient" style="font-size: 2rem; opacity: 0.8;"></i>
                            <div>
                                <h3 style="margin-bottom: 0.2rem;">${d.name}</h3>
                                <span style="color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase;">Official Candidate</span>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div class="text-gradient" style="font-size: 1.8rem; font-weight: 800;">${d.votes}</div>
                            <div style="font-size: 0.7rem; color: var(--text-secondary);">TOTAL VOTES</div>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        window.addEventListener('beforeunload', () => {
            if (pollingInterval) clearInterval(pollingInterval);
        });
    </script>
</body>
</html>
