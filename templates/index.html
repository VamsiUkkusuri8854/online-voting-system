<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteSafe | Secure Digital Voting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        // Critical: Fast theme apply to prevent flash
        (function() {
            const savedTheme = localStorage.getItem('votesafe_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        /* Login Page Image Background */
        body.login-page {
            /* Linear gradient adds the dark transparent overlay */
            background-image: linear-gradient(rgba(5, 8, 15, 0.6), rgba(5, 8, 15, 0.85)), url("{{ url_for('static', filename='images/voting_bg.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
        }

        /* Enhanced Auth Container Glassmorphism */
        .auth-container { 
            max-width: 420px; 
            margin: 5rem auto; 
            padding: 3rem 2.5rem; 
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border-radius: 24px;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="login-page">
    <div id="loader" class="loading-overlay"><div class="spinner"></div></div>

    <nav>
        <div class="logo">VOTE_SAFE</div>
        <div class="nav-links">
            <a href="/results" class="nav-item hidden" id="resultsLink"><i class="fa-solid fa-chart-pie" style="margin-right: 6px;"></i>Results</a>
            <div class="theme-toggle" onclick="ThemeManager.toggle()" title="Toggle Theme">
                <i class="fas fa-sun"></i>
            </div>
            <button class="btn btn-outline" onclick="location.reload()"><i class="fa-solid fa-rotate-right" style="margin-right: 6px;"></i>Refresh</button>
        </div>
    </nav>

    <div class="container">
        <!-- Login Section -->
        <section id="loginSection" class="glass auth-container animate-slide">
            <h2 style="margin-bottom: 2rem; text-align: center;" class="text-gradient">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.85rem;">EMAIL ADDRESS</label>
                    <input type="email" id="loginEmail" required placeholder="admin@voting.com" 
                        style="width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: white; outline: none;">
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.85rem;">PASSWORD</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••"
                        style="width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: white; outline: none;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Sign In</button>
                <p style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
                    New here? <span style="color: var(--accent-green); cursor: pointer; font-weight: 600;" onclick="toggleAuth()">Create Account</span>
                </p>
            </form>
        </section>

        <!-- Register Section (Hidden) -->
        <section id="registerSection" class="glass auth-container animate-slide hidden">
            <h2 style="margin-bottom: 2rem; text-align: center;" class="text-gradient">Join VoteSafe</h2>
            <form id="registerForm">
                <div class="form-group" style="margin-bottom: 1.2rem;">
                    <label style="display: block; margin-bottom: 0.4rem; color: var(--text-secondary); font-size: 0.85rem;">FULL NAME</label>
                    <input type="text" id="regName" required placeholder="John Doe"
                        style="width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: white; outline: none;">
                </div>
                <div class="form-group" style="margin-bottom: 1.2rem;">
                    <label style="display: block; margin-bottom: 0.4rem; color: var(--text-secondary); font-size: 0.85rem;">EMAIL ADDRESS</label>
                    <input type="email" id="regEmail" required placeholder="john@example.com"
                        style="width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: white; outline: none;">
                </div>
                <div class="form-group" style="margin-bottom: 1.8rem;">
                    <label style="display: block; margin-bottom: 0.4rem; color: var(--text-secondary); font-size: 0.85rem;">PASSWORD</label>
                    <input type="password" id="regPassword" required placeholder="••••••••"
                        style="width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: white; outline: none;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Register Now</button>
                <p style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
                    Have an account? <span style="color: var(--accent-green); cursor: pointer; font-weight: 600;" onclick="toggleAuth()">Back to Login</span>
                </p>
            </form>
        </section>
    </div>

    <footer style="text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 0.85rem;">
        &copy; 2026 Built with ❤️ by Vamsi
    </footer>

    <script src="{{ url_for('static', filename='js/auth_handler.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Inline landing toggles
        function toggleAuth() {
            document.getElementById('loginSection').classList.toggle('hidden');
            document.getElementById('registerSection').classList.toggle('hidden');
        }

        // Auto-redirect if already logged in
        if (Auth.isAuthenticated()) {
            window.location.href = '/dashboard';
        }
        
        window.addEventListener('load', () => {
            // Check auth for navbar visibility before potential redirect
            if (Auth.isAuthenticated()) {
                const resultsLink = document.getElementById('resultsLink');
                if (resultsLink) resultsLink.classList.remove('hidden');
            }

            setTimeout(() => document.getElementById('loader').style.opacity = '0', 500);
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1000);
        });
    </script>
</body>
</html>
